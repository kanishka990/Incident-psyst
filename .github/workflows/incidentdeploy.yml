name: CI-CD Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/incident-backend ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/incident-backend

      - name: Build & Push Frontend
        run: |
          docker build --build-arg REACT_APP_API_URL=/api -t ${{ secrets.DOCKER_USERNAME }}/incident-frontend ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/incident-frontend

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/incident-platform
            docker compose pull
            docker compose up -d
