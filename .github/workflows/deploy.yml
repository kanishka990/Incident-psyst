name: Deploy Incident Platform

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/incident-backend ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/incident-backend

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/incident-frontend ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/incident-frontend

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/incident-platform
            docker pull ${{ secrets.DOCKER_USERNAME }}/incident-backend
            docker pull ${{ secrets.DOCKER_USERNAME }}/incident-frontend
            docker-compose down
            docker-compose up -d
